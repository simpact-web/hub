<script>window.SIMPACT_ROOT='../../';</script>

<script>
let currentView = 'table';
const STATUTS = ['waiting_file','file_received','production','finishing','ready','delivered','cancelled'];
const STATUS_LABELS = {'waiting_file':'Att. fichier','file_received':'Fichier reçu','production':'Production','finishing':'Finition','ready':'Prêt','delivered':'Livré','cancelled':'Annulé'};
const STATUS_COLORS = {'waiting_file':'#FF9800','file_received':'#2196F3','production':'#9C27B0','finishing':'#FF5722','ready':'#4CAF50','delivered':'#00BCD4','cancelled':'#F44336'};

document.addEventListener('DOMContentLoaded', async () => {
  await Storage.init();
  Auth.init();
  if (!Auth.guard('ADMIN')) return;
  App.setupUI();
  // Peupler filtre clients
  const sel = document.getElementById('filter-client');
  Storage.getClients().forEach(c => { const o=document.createElement('option'); o.value=c.id; o.textContent=c.nom; sel.appendChild(o); });
  renderView();
});

function setView(v) {
  currentView = v;
  document.getElementById('btn-table').className = v==='table'?'btn btn-primary btn-sm':'btn btn-secondary btn-sm';
  document.getElementById('btn-kanban').className = v==='kanban'?'btn btn-primary btn-sm':'btn btn-secondary btn-sm';
  renderView();
}

function renderView() {
  let cmds = Storage.getCommandes();
  const filterCli = document.getElementById('filter-client').value;
  if (filterCli) cmds = cmds.filter(c=>c.client_id===filterCli);
  if (currentView === 'table') renderTable(cmds);
  else renderKanban(cmds);
}

function renderTable(cmds) {
  document.getElementById('view-container').innerHTML = '<div class="table-wrap"><table class="table table-clickable"><thead><tr><th>N° Commande</th><th>Client</th><th>Produit</th><th>Date</th><th>Délai</th><th>Montant TTC</th><th>Statut</th><th>Actions</th></tr></thead><tbody>' +
  cmds.map(c=>{
    const cl=Storage.getClient(c.client_id);
    const isUrgent=c.config?.urgence&&c.config.urgence!=='standard';
    return`<tr onclick="openCmdPanel('${c.id}')" style="${isUrgent?'background:rgba(255,152,0,.05)':''}">
      <td class="font-mono font-semibold text-sm">${isUrgent?'⚡ ':''}<span>${c.id}</span></td>
      <td><div class="font-semibold">${cl?.nom||c.client_id}</div><span class="badge ${Utils.segmentClass(cl?.segment)} badge-sm">${Utils.segmentLabel(cl?.segment||'standard')}</span></td>
      <td class="text-sm">${c.produit||'—'}</td>
      <td class="text-muted text-sm">${Utils.dateFormat(c.date)}</td>
      <td class="text-sm">${Utils.dateFormat(c.delai)}</td>
      <td class="tnd font-bold">${Utils.tnd(c.montant_ttc,0)}</td>
      <td><span class="status-badge ${Utils.statusClass(c.statut)}">${Utils.statusLabel(c.statut)}</span></td>
      <td onclick="event.stopPropagation()">
        <select class="form-control" style="height:32px;font-size:.75rem;padding:4px 8px;" onchange="updateStatus('${c.id}',this.value)">
          ${STATUTS.map(s=>`<option value="${s}"${c.statut===s?' selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
        </select>
      </td>
    </tr>`;
  }).join('') + '</tbody></table></div>';
}

function renderKanban(cmds) {
  const cols = STATUTS.filter(s=>s!=='cancelled').map(s=>{
    const colCmds = cmds.filter(c=>c.statut===s);
    return`<div class="kanban-col">
      <div class="kanban-col-header" style="color:${STATUS_COLORS[s]}">
        ${Utils.statusLabel(s)} <span class="badge badge-dark badge-sm">${colCmds.length}</span>
      </div>
      <div class="kanban-cards">
        ${colCmds.map(c=>{
          const cl=Storage.getClient(c.client_id);
          return`<div class="kanban-card" onclick="openCmdPanel('${c.id}')">
            <div class="font-mono text-xs text-muted mb-1">${c.id}</div>
            <div class="font-semibold text-sm mb-1">${cl?.nom||'?'}</div>
            <div class="text-xs text-muted mb-2">${c.produit||'—'}</div>
            <div class="flex justify-between items-center">
              <span class="tnd text-sm font-bold" style="color:var(--cyan-600)">${Utils.tnd(c.montant_ttc,0)}</span>
              <select style="height:26px;font-size:.6875rem;border:1px solid var(--gray-200);border-radius:5px;padding:2px 4px;" onchange="event.stopPropagation();updateStatus('${c.id}',this.value)">
                ${STATUTS.map(s=>`<option value="${s}"${c.statut===s?' selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
              </select>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('view-container').innerHTML = `<div class="kanban-board">${cols}</div>`;
}

function updateStatus(id, newStatus) {
  Storage.updateCommande(id, {statut:newStatus});
  Notify.success('Statut mis à jour', Utils.statusLabel(newStatus));
  renderView();
}

function openCmdPanel(id) {
  const c = Storage.getCommande(id);
  if (!c) return;
  const cl = Storage.getClient(c.client_id);
  const cfg = c.config||{};
  document.getElementById('panel-cmd-title').textContent = c.id;
  document.getElementById('panel-cmd-body').innerHTML = `
    <div class="mb-4 flex gap-2 flex-wrap">
      <span class="status-badge ${Utils.statusClass(c.statut)}">${Utils.statusLabel(c.statut)}</span>
      ${c.config?.urgence&&c.config.urgence!=='standard'?'<span class="badge badge-warning">⚡ URGENT</span>':''}
    </div>
    <div class="card mb-4">
      <div class="card-header"><h4>Client</h4></div>
      <div class="card-body">
        <div class="flex items-center gap-3 mb-3">
          <div class="user-avatar">${cl?.avatar||'?'}</div>
          <div><div class="font-semibold">${cl?.nom||'?'}</div><div class="text-sm text-muted">${cl?.email||''}</div></div>
          <span class="badge ${Utils.segmentClass(cl?.segment||'standard')} ml-auto">${Utils.segmentLabel(cl?.segment||'standard')}</span>
        </div>
      </div>
    </div>
    <div class="card mb-4">
      <div class="card-header"><h4>Produit</h4></div>
      <div class="card-body">
        <div class="font-semibold mb-2">${c.produit||'—'}</div>
        ${Object.entries(cfg).map(([k,v])=>`<div class="flex justify-between py-1 border-bottom text-sm"><span class="text-muted">${k}</span><span>${v}</span></div>`).join('')}
      </div>
    </div>
    <div class="card mb-4">
      <div class="card-header"><h4>Changer le statut</h4></div>
      <div class="card-body">
        <div class="flex flex-wrap gap-2">
          ${STATUTS.map(s=>`<button class="btn btn-sm ${c.statut===s?'btn-primary':'btn-secondary'}" onclick="updateStatus('${c.id}','${s}');App.closePanel('panel-cmd')">${Utils.statusLabel(s)}</button>`).join('')}
        </div>
      </div>
    </div>
    <div class="flex flex-col gap-2">
      <button class="btn btn-primary" onclick="PDF.genererBonCommande('${c.id}')">📄 Bon de commande PDF</button>
      <button class="btn btn-secondary btn-sm" onclick="Notify.info('Notification envoyée','Le client a été informé par email (simulé)')">📧 Notifier le client</button>
    </div>`;
  App.openPanel('panel-cmd');
}
</script>
