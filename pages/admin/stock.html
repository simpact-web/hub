<main class="main-content">
  <!-- Alertes stock -->

  <div class="grid-2 gap-6">
    <!-- Papiers -->

      <div class="card-header"><h4>📄 Stocks papier</h4></div>
      <div class="card-body p-0" id="papier-stocks"></div>
    </div>
    <!-- Consommables V1000 -->
    <div class="card">
      <div class="card-header"><h4>🖨️ Consommables Canon V1000</h4></div>
      <div class="card-body" id="toner-stocks"></div>
    </div>
  </div>
</main>
</div>
<div id="toast-container" class="toast-container"></div>
<script>window.SIMPACT_ROOT='../../';</script>
<script src="../../assets/js/utils.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/notifications.js"></script>
<script src="../../assets/js/sheets.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Storage.init();
  Auth.init();
  if (!Auth.guard('ADMIN')) return;
  App.setupUI();
  const stocks = Storage.getStocks();
  const papiers = stocks.filter(s=>s.type==='papier');
  const consommables = stocks.filter(s=>s.type==='consommable');

  // Alertes
  const problemes = stocks.filter(s=>s.statut!=='ok');
  document.getElementById('stock-alerts').innerHTML = problemes.map(s=>`
    <div class="alert ${s.statut==='rupture'?'alert-danger':'alert-warning'} mb-3">
      <span class="alert-icon">${s.statut==='rupture'?'🔴':'⚠️'}</span>
      <div><div class="alert-title">${s.nom}</div>
      <div>${s.statut==='rupture'?'RUPTURE DE STOCK':'Stock bas'} — ${s.qty||s.qty_pct+'%'} restant(s)</div></div>
    </div>`).join('');

  // Papiers
  document.getElementById('papier-stocks').innerHTML = papiers.map(s=>{
    const pct = Math.round(s.qty/Math.max(s.seuil*5,1)*100);
    const color = s.statut==='rupture'?'danger':s.statut==='low'?'warning':'';
    return`<div class="stock-item p-4">
      <div class="stock-info">
        <div class="stock-name">${s.nom}</div>
        <div class="stock-detail">${s.format||''} · Seuil alerte : ${s.seuil} ${s.unite}</div>
        <div class="progress mt-2" style="width:180px;">
          <div class="progress-bar${color?' '+color:''}" style="width:${Math.min(100,pct)}%"></div>
        </div>
      </div>
      <div class="stock-qty" style="color:${s.statut==='rupture'?'var(--danger-dark)':s.statut==='low'?'var(--warning-dark)':'var(--success-dark)'}">
        ${s.qty}<div class="text-xs text-muted">${s.unite}</div>
        <span class="badge ${s.statut==='rupture'?'badge-danger':s.statut==='low'?'badge-warning':'badge-success'} badge-sm mt-1">${s.statut==='rupture'?'Rupture':s.statut==='low'?'Bas':'OK'}</span>
      </div>
    </div>`;
  }).join('');

  // Consommables
  document.getElementById('toner-stocks').innerHTML = consommables.map(t=>{
    const pct = t.qty_pct||0;
    const color = pct<30?'danger':pct<50?'warning':'';
    const colorStyle = pct<30?'var(--danger-dark)':pct<50?'var(--warning-dark)':'var(--success-dark)';
    return`<div class="mb-4">
      <div class="flex justify-between items-center mb-1">
        <span class="font-semibold text-sm">${t.nom}</span>
        <span class="font-mono font-bold text-sm" style="color:${colorStyle};">${pct}%</span>
      </div>
      <div class="progress progress-lg">
        <div class="progress-bar${color?' '+color:''}" style="width:${pct}%"></div>
      </div>
      <div class="text-xs text-muted mt-1">Dernier remplacement : ${t.dernier_remplacement||'—'}</div>
    </div>`;
  }).join('');
});
</script>
