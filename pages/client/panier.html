<div class="mobile-overlay" id="mobile-overlay"></div>
<header class="app-header">
  <button class="burger-btn" id="burger-btn"><div class="burger-line"></div><div class="burger-line"></div><div class="burger-line"></div></button>
  <div><div class="header-title">Mon panier</div></div>
  <div class="header-actions ml-auto">
    <button class="btn btn-secondary btn-sm" onclick="window.location.href='configurateur.html'">+ Ajouter un produit</button>
  </div>
</header>
<main class="main-content">
  <div style="display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start;">
    <div>
      <div id="cart-items"></div>
    </div>
    <div>
      <!-- Récapitulatif -->
      <div class="card" style="position:sticky;top:88px;">
        <div class="card-header"><h4>Récapitulatif</h4></div>
        <div class="card-body" id="cart-summary">
          <div class="empty-state"><div class="empty-state-icon">🛒</div><div class="empty-state-title">Panier vide</div></div>
        </div>
        <div class="card-footer">
          <button class="btn btn-gradient w-full" id="btn-validate" disabled onclick="validerCommande()">Valider la commande</button>
        </div>
      </div>
    </div>
  </div>
</main>
<!-- Modal validation -->
<div class="modal-overlay" id="modal-validate" onclick="if(event.target===this)App.closeModal('modal-validate')">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Confirmer la commande</span>
      <button class="modal-close" onclick="App.closeModal('modal-validate')">✕</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Mode de livraison</label>
        <select class="form-control" id="livraison-select">
          <option value="gratuit">Retrait en imprimerie (gratuit)</option>
          <option value="grand_tunis">Livraison Grand Tunis (+5 TND HT)</option>
          <option value="national">Livraison nationale (+8 TND HT)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Instructions spéciales</label>
        <textarea class="form-control" id="order-note" placeholder="Instructions de livraison, conditionnement, références…" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="App.closeModal('modal-validate')">Annuler</button>
      <button class="btn btn-gradient btn-sm" onclick="confirmerCommande()">Confirmer la commande</button>
    </div>
  </div>
</div>
<!-- Modal confirmation -->
<div class="modal-overlay" id="modal-confirmed" onclick="">
  <div class="modal modal-sm" style="text-align:center;">
    <div class="card-body p-8">
      <div style="font-size:3rem;margin-bottom:16px;">🎉</div>
      <h3 style="margin-bottom:8px;">Commande validée !</h3>
      <p id="confirm-id" class="text-muted mb-6"></p>
      <div class="flex flex-col gap-2">
        <button class="btn btn-primary" onclick="App.closeModal('modal-confirmed');window.location.href='commandes.html'">Voir mes commandes</button>
        <button class="btn btn-secondary btn-sm" id="btn-dl-pdf" onclick="downloadPDF()">Télécharger le bon de commande PDF</button>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/utils.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/pricing.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/notifications.js"></script>
<script src="../../assets/js/charts.js"></script>
<script src="../../assets/js/pdf.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
let lastCmd = null;
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.guard('CLIENT')) return;
  await Storage.init();
  renderCart();
  window.addEventListener('cart:updated', renderCart);
});

function renderCart() {
  const items = Storage.getPanier();
  const area = document.getElementById('cart-items');
  if (!items.length) {
    area.innerHTML = `<div class="card"><div class="card-body"><div class="empty-state">
      <div class="empty-state-icon">🛒</div>
      <div class="empty-state-title">Votre panier est vide</div>
      <div class="empty-state-text">Configurez un produit pour l'ajouter ici</div>
      <button class="btn btn-gradient btn-sm" onclick="window.location.href='configurateur.html'">Configurer un produit</button>
    </div></div></div>`;
    document.getElementById('btn-validate').disabled = true;
    document.getElementById('cart-summary').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🛒</div><div class="empty-state-title">Panier vide</div></div>';
    return;
  }
  area.innerHTML = items.map(item => `
    <div class="card mb-3">
      <div class="card-body">
        <div class="flex gap-4 items-start">
          <div style="font-size:2rem;">${getProdIcon(item.config?.produit)}</div>
          <div class="flex-1">
            <div class="font-semibold font-primary mb-1">${item.produit_label}</div>
            <div class="text-sm text-muted mb-2">${describeConfig(item.config)}</div>
            <div class="flex gap-2 items-center">
              <span class="badge ${item.fichier_status==='valide'?'badge-success':'badge-warning'} badge-sm">
                ${item.fichier_status==='valide'?'✅ Fichier fourni':'⚠️ Fichier manquant'}
              </span>
            </div>
          </div>
          <div class="text-right">
            <div class="tnd font-extrabold text-2xl" style="font-family:Space Mono,monospace;color:var(--cyan-600);">${Utils.tnd(item.devis?.total_ttc,0)}</div>
            <div class="text-xs text-muted">TTC · ${Utils.tnd(item.devis?.total_ht,0)} HT</div>
            <button class="btn btn-danger btn-sm mt-2" onclick="Cart.remove('${item.panier_id}')">Supprimer</button>
          </div>
        </div>
      </div>
    </div>`).join('');

  const totalHT = Cart.getTotal();
  const totalTTC = Cart.getTotalTTC();
  document.getElementById('cart-summary').innerHTML = `
    <div class="price-line"><span>Sous-total HT</span><span class="tnd font-semibold">${Utils.tnd(totalHT)}</span></div>
    <div class="price-line text-muted"><span>TVA 19%</span><span class="tnd">${Utils.tnd(totalHT*0.19)}</span></div>
    <div class="divider"></div>
    <div class="price-line" style="font-size:1.125rem;font-weight:800;"><span>Total TTC</span><span class="tnd" style="color:var(--cyan-600);">${Utils.tnd(totalTTC,0)}</span></div>
    <div class="mt-3 text-xs text-muted">⚠️ Le règlement s'effectue directement auprès de Simpact — aucun paiement en ligne.</div>`;
  document.getElementById('btn-validate').disabled = false;
}

function getProdIcon(p) {
  const m={'flyer':'📄','carte_visite':'💳','depliant':'📰','brochure':'📖','livre_nb':'📚','entete':'📝','affiche':'🖼'};
  return m[p]||'🖨';
}

function describeConfig(c) {
  if (!c) return '';
  const parts=[];
  if (c.format) parts.push(c.format.replace('_',' ').toUpperCase());
  if (c.faces) parts.push(c.faces==='rv'?'Recto/Verso':'Recto');
  if (c.pages) parts.push(c.pages+' pages');
  if (c.papier) parts.push(c.papier.replace('-',' '));
  if (c.quantite) parts.push('×'+c.quantite);
  if (c.urgence&&c.urgence!=='standard') parts.push(c.urgence==='urgent_24h'?'⚡Urgent':'⚡Express');
  return parts.join(' · ');
}

function validerCommande() { App.openModal('modal-validate'); }

function confirmerCommande() {
  const livraison = document.getElementById('livraison-select').value;
  const note = document.getElementById('order-note').value;
  const cmd = Cart.validerCommande(livraison, note);
  if (cmd) {
    lastCmd = cmd;
    App.closeModal('modal-validate');
    document.getElementById('confirm-id').textContent = 'N° '+cmd.id;
    App.openModal('modal-confirmed');
    renderCart();
  }
}

function downloadPDF() {
  if (lastCmd) PDF.genererBonCommande(lastCmd.id);
}
</script>
