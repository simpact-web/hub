  <div class="header-actions ml-auto gap-3">
    <select class="form-control" id="filter-status" style="width:auto;height:38px;" onchange="filterOrders()">
      <option value="">Tous les statuts</option>
      <option value="waiting_file">En attente fichier</option>
      <option value="file_received">Fichier reçu</option>
      <option value="production">En production</option>
      <option value="finishing">Finition</option>
      <option value="ready">Prêt</option>
      <option value="delivered">Livré</option>
      <option value="cancelled">Annulé</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="window.location.href='configurateur.html'">+ Nouvelle commande</button>
  </div>
</header>
<main class="main-content">
  <!-- Tabs -->
  <div class="tabs mb-6" data-tabs>
    <button class="tab active" data-tab="all" onclick="switchTab('all',this)">Toutes <span class="tab-badge" id="badge-all">0</span></button>
    <button class="tab" data-tab="encours" onclick="switchTab('encours',this)">En cours <span class="tab-badge" id="badge-encours">0</span></button>
    <button class="tab" data-tab="done" onclick="switchTab('done',this)">Terminées <span class="tab-badge" id="badge-done">0</span></button>
  </div>
  <div id="orders-table"></div>
</main>
<!-- Panel détail -->
<div class="slide-panel-overlay" id="panel-detail-overlay" onclick="App.closePanel('panel-detail')"></div>
<div class="slide-panel" id="panel-detail">
  <div class="slide-panel-header">
    <span class="modal-title" id="panel-cmd-id">Détail commande</span>
    <button class="modal-close" onclick="App.closePanel('panel-detail')">✕</button>
  </div>
  <div class="slide-panel-body" id="panel-detail-body"></div>
</div>
</div>
<div id="toast-container" class="toast-container"></div>
<script>window.SIMPACT_ROOT='../../';</script>
<script src="../../assets/js/utils.js"></script>
<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/pricing.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/notifications.js"></script>
<script src="../../assets/js/charts.js"></script>
<script src="../../assets/js/pdf.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
let allOrders = [], currentTab = 'all', filterSt = '';
document.addEventListener('DOMContentLoaded', async () => {
  await Storage.init();
  Auth.init();
  if (!Auth.guard('CLIENT')) return;
  App.setupUI();
  loadOrders();
});

function loadOrders() {
  const user = Auth.current;
  allOrders = Storage.getCommandes(user.id);
  updateBadges();
  renderOrders();
}

function updateBadges() {
  const encours = allOrders.filter(c=>!['delivered','cancelled'].includes(c.statut));
  const done = allOrders.filter(c=>['delivered','cancelled'].includes(c.statut));
  document.getElementById('badge-all').textContent = allOrders.length;
  document.getElementById('badge-encours').textContent = encours.length;
  document.getElementById('badge-done').textContent = done.length;
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

function filterOrders() {
  filterSt = document.getElementById('filter-status').value;
  renderOrders();
}

function renderOrders() {
  let orders = [...allOrders];
  if (currentTab === 'encours') orders = orders.filter(c=>!['delivered','cancelled'].includes(c.statut));
  if (currentTab === 'done') orders = orders.filter(c=>['delivered','cancelled'].includes(c.statut));
  if (filterSt) orders = orders.filter(c=>c.statut===filterSt);
  
  const wrap = document.getElementById('orders-table');
  if (!orders.length) {
    wrap.innerHTML = '<div class="card"><div class="card-body"><div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-title">Aucune commande</div></div></div></div>';
    return;
  }
  wrap.innerHTML = '<div class="table-wrap"><table class="table table-clickable"><thead><tr><th>N° Commande</th><th>Produit</th><th>Date</th><th>Délai</th><th>Montant TTC</th><th>Statut</th><th>Actions</th></tr></thead><tbody>' +
    orders.map(c => `<tr onclick="openDetail('${c.id}')">
      <td class="font-semibold" style="font-family:Space Mono,monospace;font-size:.8125rem;">${c.id}</td>
      <td>${c.produit||'—'}</td>
      <td class="text-muted">${Utils.dateFormat(c.date)}</td>
      <td class="text-muted">${Utils.dateFormat(c.delai)}</td>
      <td><span class="tnd font-bold">${Utils.tnd(c.montant_ttc,0)}</span></td>
      <td><span class="status-badge ${Utils.statusClass(c.statut)}">${Utils.statusLabel(c.statut)}</span></td>
      <td onclick="event.stopPropagation()">
        <div class="flex gap-2">
          <button class="btn btn-secondary btn-sm" onclick="PDF.genererBonCommande('${c.id}')">PDF</button>
          <button class="btn btn-primary btn-sm" onclick="reorder('${c.id}')">↻</button>
        </div>
      </td>
    </tr>`).join('') +
    '</tbody></table></div>';
}

function openDetail(id) {
  const c = Storage.getCommande(id);
  if (!c) return;
  document.getElementById('panel-cmd-id').textContent = c.id;
  const cfg = c.config || {};
  document.getElementById('panel-detail-body').innerHTML = `
    <div class="mb-4">
      <span class="status-badge ${Utils.statusClass(c.statut)}" style="font-size:.875rem;">${Utils.statusLabel(c.statut)}</span>
    </div>
    <div class="card mb-4">
      <div class="card-header"><h4>Produit</h4></div>
      <div class="card-body">
        <div class="font-semibold mb-2">${c.produit||'—'}</div>
        ${Object.entries(cfg).map(([k,v])=>`<div class="flex justify-between text-sm py-1 border-bottom"><span class="text-muted">${k}</span><span class="font-medium">${v}</span></div>`).join('')}
      </div>
    </div>
    <div class="card mb-4">
      <div class="card-header"><h4>Finances</h4></div>
      <div class="card-body">
        <div class="flex justify-between py-1"><span class="text-muted">Total HT</span><span class="tnd font-semibold">${Utils.tnd(c.montant_ht)}</span></div>
        <div class="flex justify-between py-1"><span class="text-muted">TVA 19%</span><span class="tnd">${Utils.tnd(c.tva)}</span></div>
        <div class="flex justify-between py-1 font-bold"><span>Total TTC</span><span class="tnd" style="color:var(--cyan-600);">${Utils.tnd(c.montant_ttc,0)}</span></div>
      </div>
    </div>
    <div class="card mb-4">
      <div class="card-header"><h4>Fichier</h4></div>
      <div class="card-body">
        ${c.fichier ? `<div class="flex items-center gap-2"><span class="badge badge-success">✓ ${c.fichier}</span></div>` :
        `<div class="alert alert-warning"><span>⚠️</span><div><div class="alert-title">Fichier manquant</div><div>Envoyez votre fichier à contact@simpact.tn avec la référence ${c.id}</div></div></div>`}
      </div>
    </div>
    <div class="card mb-4">
      <div class="card-header"><h4>Dates</h4></div>
      <div class="card-body">
        <div class="timeline">
          <div class="timeline-item"><div class="timeline-dot cyan"></div><div class="timeline-date">${Utils.dateFormat(c.date)}</div><div class="timeline-title">Commande créée</div></div>
          <div class="timeline-item"><div class="timeline-dot ${c.statut!=='waiting_file'?'success':'warning'}"></div><div class="timeline-date">${Utils.dateFormat(c.date)}</div><div class="timeline-title">${Utils.statusLabel(c.statut)}</div></div>
          <div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-date">${Utils.dateFormat(c.delai)}</div><div class="timeline-title">Délai prévu</div></div>
        </div>
      </div>
    </div>
    <div class="flex flex-col gap-2">
      <button class="btn btn-primary" onclick="PDF.genererBonCommande('${c.id}')">📄 Bon de commande PDF</button>
      <button class="btn btn-secondary btn-sm" onclick="reorder('${c.id}')">↻ Re-commander</button>
      <a href="mailto:contact@simpact.tn?subject=Commande ${c.id}" class="btn btn-ghost btn-sm">✉ Contacter le SAV</a>
    </div>`;
  App.openPanel('panel-detail');
}

function reorder(id) {
  const c = Storage.getCommande(id);
  if (c?.config) window.location.href = 'configurateur.html?cfg=' + encodeURIComponent(JSON.stringify(c.config));
}
</script>
