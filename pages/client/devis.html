<script>
document.addEventListener('DOMContentLoaded', async () => {
  await Storage.init();
  Auth.init();
  if (!Auth.guard('CLIENT')) return;
  App.setupUI();
  const user = Auth.current;
  const devis = Storage.getDevis(user.id);
  const wrap = document.getElementById('devis-list');
  if (!devis.length) {
    wrap.innerHTML = '<div class="card"><div class="card-body"><div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Aucun devis</div><button class="btn btn-gradient btn-sm" onclick="window.location.href='configurateur.html'">Créer un devis</button></div></div></div>';
    return;
  }
  wrap.innerHTML = '<div class="table-wrap"><table class="table"><thead><tr><th>N° Devis</th><th>Produit</th><th>Date</th><th>Expiration</th><th>Montant TTC</th><th>Statut</th><th>Actions</th></tr></thead><tbody>' +
  devis.map(d=>`<tr>
    <td class="font-semibold" style="font-family:Space Mono,monospace;font-size:.8125rem;">${d.id}</td>
    <td>${d.produit||'—'}</td>
    <td class="text-muted">${Utils.dateFormat(d.date)}</td>
    <td class="text-muted">${Utils.dateFormat(d.expiry)}</td>
    <td><span class="tnd font-bold">${Utils.tnd(d.montant_ttc,0)}</span></td>
    <td><span class="status-badge ${Utils.statusClass(d.statut)}">${Utils.statusLabel(d.statut)}</span></td>
    <td>
      <div class="flex gap-2 flex-wrap">
        <button class="btn btn-secondary btn-sm" onclick="PDF.genererBonCommande('${d.id}')">PDF</button>
        ${d.statut==='pending'?`<button class="btn btn-success btn-sm" onclick="convertToOrder('${d.id}')">→ Commander</button>`:''}
        ${d.statut==='expired'?`<button class="btn btn-primary btn-sm" onclick="window.location.href='configurateur.html?cfg='+encodeURIComponent(JSON.stringify((Storage.getDevisItem('${d.id}')?.config)||{}))">Recréer</button>`:''}
      </div>
    </td>
  </tr>`).join('') + '</tbody></table></div>';
});
function convertToOrder(id) {
  const d = Storage.getDevisItem(id);
  if (!d) return;
  const cmd = {
    id:Utils.genCommandeId(), client_id:d.client_id, produit:d.produit, config:d.config,
    montant_ht:d.montant_ht, tva:d.tva, montant_ttc:d.montant_ttc,
    statut:'waiting_file', date:new Date().toISOString(),
    delai:Utils.addWorkDays(new Date().toISOString(),2), devis_id:id, note:d.note||''
  };
  Storage.addCommande(cmd);
  Storage.updateDevis(id,{statut:'accepted',commande_id:cmd.id});
  Notify.success('Commande créée','N° '+cmd.id);
  setTimeout(()=>location.reload(),1500);
}
</script>
